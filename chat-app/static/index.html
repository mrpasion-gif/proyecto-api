<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GoChat — Chat en Tiempo Real</title>
<style>
  :root {
    --bg: #0F172A;
    --surface: #1E293B;
    --surface2: #263347;
    --border: rgba(99,179,237,0.15);
    --blue: #60A5FA;
    --teal: #34D399;
    --amber: #FBBF24;
    --pink: #F472B6;
    --text: #E2E8F0;
    --muted: #64748B;
    --radius: 12px;
  }
  * { margin:0; padding:0; box-sizing:border-box }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── LOGIN SCREEN ── */
  #login-screen {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--bg);
  }
  .login-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 40px;
    width: 100%;
    max-width: 400px;
    text-align: center;
  }
  .login-logo {
    font-size: 48px;
    font-weight: 900;
    color: var(--blue);
    letter-spacing: -3px;
    margin-bottom: 6px;
  }
  .login-sub {
    font-size: 14px;
    color: var(--muted);
    margin-bottom: 32px;
  }
  .login-card input, .login-card select {
    width: 100%;
    padding: 12px 16px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-size: 14px;
    margin-bottom: 12px;
    outline: none;
    transition: border-color 0.2s;
  }
  .login-card input:focus {
    border-color: var(--blue);
  }
  .login-card button {
    width: 100%;
    padding: 13px;
    background: var(--blue);
    border: none;
    border-radius: 10px;
    color: #0F172A;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
    margin-top: 4px;
  }
  .login-card button:hover { opacity: 0.9 }
  .login-card button:active { transform: scale(0.98) }
  .login-error {
    color: #F87171;
    font-size: 13px;
    margin-top: 8px;
    display: none;
  }
  .tech-tag {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(96,165,250,0.1);
    border: 1px solid rgba(96,165,250,0.25);
    border-radius: 100px;
    padding: 4px 12px;
    font-size: 11px;
    color: var(--blue);
    margin-bottom: 24px;
  }

  /* ── CHAT SCREEN ── */
  #chat-screen {
    display: none;
    flex: 1;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
  }

  /* Header */
  .chat-header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 14px 20px;
    display: flex;
    align-items: center;
    gap: 14px;
    flex-shrink: 0;
  }
  .header-logo {
    font-size: 22px;
    font-weight: 900;
    color: var(--blue);
    letter-spacing: -1.5px;
  }
  .header-room {
    display: flex;
    align-items: center;
    gap: 8px;
    flex: 1;
  }
  .room-badge {
    background: rgba(96,165,250,0.12);
    border: 1px solid rgba(96,165,250,0.3);
    border-radius: 8px;
    padding: 4px 12px;
    font-size: 13px;
    font-weight: 600;
    color: var(--blue);
  }
  .ws-status {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 11px;
    color: var(--muted);
  }
  .ws-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--teal);
    animation: pulse-dot 2s infinite;
  }
  .ws-dot.off { background: #F87171; animation: none }
  @keyframes pulse-dot {
    0%,100% { opacity:1 } 50% { opacity:0.4 }
  }
  .btn-leave {
    background: rgba(248,113,113,0.1);
    border: 1px solid rgba(248,113,113,0.3);
    border-radius: 8px;
    color: #F87171;
    padding: 6px 14px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
  }

  /* Chat body */
  .chat-body {
    flex: 1;
    display: grid;
    grid-template-columns: 1fr 200px;
    overflow: hidden;
  }

  /* Messages */
  .messages-area {
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    scroll-behavior: smooth;
  }
  #messages::-webkit-scrollbar { width: 4px }
  #messages::-webkit-scrollbar-track { background: transparent }
  #messages::-webkit-scrollbar-thumb { background: var(--surface2); border-radius: 4px }

  /* Message bubbles */
  .msg {
    display: flex;
    flex-direction: column;
    max-width: 65%;
    gap: 3px;
  }
  .msg.own { align-self: flex-end; align-items: flex-end }
  .msg.other { align-self: flex-start }
  .msg-meta {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    color: var(--muted);
    padding: 0 4px;
  }
  .msg-avatar {
    width: 20px; height: 20px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 10px;
    font-weight: 700;
    flex-shrink: 0;
  }
  .msg-bubble {
    padding: 10px 14px;
    border-radius: 16px;
    font-size: 14px;
    line-height: 1.5;
    word-break: break-word;
  }
  .msg.own .msg-bubble {
    background: var(--blue);
    color: #0F172A;
    border-bottom-right-radius: 4px;
  }
  .msg.other .msg-bubble {
    background: var(--surface2);
    color: var(--text);
    border-bottom-left-radius: 4px;
  }
  .msg-time {
    font-size: 10px;
    color: var(--muted);
    padding: 0 4px;
  }

  /* System messages */
  .msg-system {
    text-align: center;
    font-size: 12px;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 8px;
    justify-content: center;
  }
  .msg-system::before,
  .msg-system::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }
  .msg-system span {
    white-space: nowrap;
    padding: 2px 10px;
    background: var(--surface);
    border-radius: 100px;
    border: 1px solid var(--border);
  }

  /* Input area */
  .input-area {
    padding: 14px 20px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    display: flex;
    gap: 10px;
    align-items: center;
    flex-shrink: 0;
  }
  #msg-input {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 11px 16px;
    color: var(--text);
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }
  #msg-input:focus { border-color: var(--blue) }
  #msg-input::placeholder { color: var(--muted) }
  #send-btn {
    background: var(--blue);
    border: none;
    border-radius: 10px;
    width: 44px;
    height: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
    flex-shrink: 0;
  }
  #send-btn:hover { opacity: 0.9 }
  #send-btn:active { transform: scale(0.95) }
  #send-btn svg { width: 18px; height: 18px; fill: #0F172A }

  /* Sidebar */
  .sidebar {
    border-left: 1px solid var(--border);
    background: var(--surface);
    padding: 16px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .sidebar-title {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
  }
  #users-list {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .user-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    padding: 5px 0;
  }
  .user-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--teal);
    flex-shrink: 0;
  }

  /* Go concepts sidebar */
  .concepts-box {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px;
  }
  .concept-item {
    display: flex;
    align-items: flex-start;
    gap: 7px;
    font-size: 11px;
    color: var(--muted);
    padding: 4px 0;
    border-bottom: 1px solid var(--border);
    line-height: 1.4;
  }
  .concept-item:last-child { border-bottom: none }
  .concept-kw {
    font-family: monospace;
    font-size: 10px;
    color: var(--teal);
    background: rgba(52,211,153,0.1);
    padding: 1px 5px;
    border-radius: 4px;
    white-space: nowrap;
    flex-shrink: 0;
  }
</style>
</head>
<body>

<!-- ── LOGIN ── -->
<div id="login-screen">
  <div class="login-card">
    <div class="tech-tag">
      <span style="width:6px;height:6px;border-radius:50%;background:#60A5FA"></span>
      WebSocket · Go · Goroutines
    </div>
    <div class="login-logo">GoChat</div>
    <div class="login-sub">Chat en tiempo real con Go y WebSocket</div>

    <input type="text" id="input-username" placeholder="Tu nombre de usuario" maxlength="20" />
    <input type="text" id="input-room" placeholder="Sala (ej: Go, General, DevOps)" maxlength="30" />
    <button onclick="connect()">Entrar al chat →</button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<!-- ── CHAT ── -->
<div id="chat-screen">

  <div class="chat-header">
    <div class="header-logo">Go</div>
    <div class="header-room">
      <span class="room-badge" id="header-room">General</span>
      <div class="ws-status">
        <div class="ws-dot" id="ws-dot"></div>
        <span id="ws-status-text">Conectado</span>
      </div>
    </div>
    <button class="btn-leave" onclick="disconnect()">Salir</button>
  </div>

  <div class="chat-body">
    <div class="messages-area">
      <div id="messages"></div>
      <div class="input-area">
        <input
          type="text"
          id="msg-input"
          placeholder="Escribe un mensaje..."
          maxlength="500"
          onkeydown="if(event.key==='Enter') sendMessage()"
        />
        <button id="send-btn" onclick="sendMessage()">
          <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        </button>
      </div>
    </div>

    <div class="sidebar">
      <div>
        <div class="sidebar-title" style="margin-bottom:10px">En la sala</div>
        <div id="users-list"></div>
      </div>

      <div>
        <div class="sidebar-title" style="margin-bottom:8px">Go en acción</div>
        <div class="concepts-box">
          <div class="concept-item">
            <span class="concept-kw">goroutine</span>
            <span>Una por cliente (Read + Write)</span>
          </div>
          <div class="concept-item">
            <span class="concept-kw">channel</span>
            <span>Broadcast, Register, Send</span>
          </div>
          <div class="concept-item">
            <span class="concept-kw">select</span>
            <span>Hub multiplexa eventos</span>
          </div>
          <div class="concept-item">
            <span class="concept-kw">map</span>
            <span>Salas y clientes activos</span>
          </div>
          <div class="concept-item">
            <span class="concept-kw">defer</span>
            <span>Cleanup al desconectar</span>
          </div>
        </div>
      </div>
    </div>
  </div>

</div>

<script>
  let ws = null;
  let myUsername = '';
  let myRoom = '';

  // Paleta de colores para avatares
  const COLORS = ['#60A5FA','#34D399','#FBBF24','#F472B6','#A78BFA','#FB923C'];
  const userColors = {};

  function getColor(username) {
    if (!userColors[username]) {
      userColors[username] = COLORS[Object.keys(userColors).length % COLORS.length];
    }
    return userColors[username];
  }

  // ── CONECTAR ────────────────────────────────────────────────────────
  function connect() {
    const username = document.getElementById('input-username').value.trim();
    const room = document.getElementById('input-room').value.trim() || 'General';
    const errEl = document.getElementById('login-error');

    if (!username) {
      errEl.textContent = 'Escribe tu nombre de usuario';
      errEl.style.display = 'block';
      return;
    }

    myUsername = username;
    myRoom = room;

    // Crear conexión WebSocket
    const proto = location.protocol === 'https:' ? 'wss' : 'ws';
    const url = `${proto}://${location.host}/ws?username=${encodeURIComponent(username)}&room=${encodeURIComponent(room)}`;

    ws = new WebSocket(url);

    ws.onopen = () => {
      // Mostrar pantalla de chat
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('chat-screen').style.display = 'flex';
      document.getElementById('header-room').textContent = '# ' + room;
      setStatus(true);
      document.getElementById('msg-input').focus();
    };

    ws.onmessage = (event) => {
      const msg = JSON.parse(event.data);
      handleMessage(msg);
    };

    ws.onclose = () => {
      setStatus(false);
      addSystemMessage('Conexión cerrada — recarga la página para reconectar');
    };

    ws.onerror = () => {
      errEl.textContent = 'No se pudo conectar. ¿Está corriendo el servidor?';
      errEl.style.display = 'block';
    };
  }

  // ── DESCONECTAR ──────────────────────────────────────────────────────
  function disconnect() {
    if (ws) ws.close();
    document.getElementById('chat-screen').style.display = 'none';
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('messages').innerHTML = '';
    document.getElementById('login-error').style.display = 'none';
  }

  // ── ENVIAR MENSAJE ───────────────────────────────────────────────────
  function sendMessage() {
    const input = document.getElementById('msg-input');
    const content = input.value.trim();
    if (!content || !ws || ws.readyState !== WebSocket.OPEN) return;

    ws.send(JSON.stringify({ content }));
    input.value = '';
    input.focus();
  }

  // ── MANEJAR MENSAJES DEL SERVIDOR ────────────────────────────────────
  function handleMessage(msg) {
    switch(msg.type) {
      case 'chat':
        addChatMessage(msg);
        break;
      case 'join':
      case 'leave':
        addSystemMessage(msg.content);
        if (msg.users) updateUserList(msg.users);
        break;
      case 'users':
        updateUserList(msg.users);
        break;
    }
  }

  // ── RENDERIZAR BURBUJA DE CHAT ───────────────────────────────────────
  function addChatMessage(msg) {
    const isOwn = msg.username === myUsername;
    const color = getColor(msg.username);
    const time = new Date(msg.timestamp).toLocaleTimeString('es', {
      hour: '2-digit', minute: '2-digit'
    });

    const div = document.createElement('div');
    div.className = `msg ${isOwn ? 'own' : 'other'}`;
    div.innerHTML = `
      ${!isOwn ? `
        <div class="msg-meta">
          <div class="msg-avatar" style="background:${color}20;color:${color}">
            ${msg.username[0].toUpperCase()}
          </div>
          <span style="color:${color};font-weight:600">${msg.username}</span>
        </div>
      ` : ''}
      <div class="msg-bubble">${escapeHTML(msg.content)}</div>
      <div class="msg-time">${time}</div>
    `;

    document.getElementById('messages').appendChild(div);
    scrollToBottom();
  }

  // ── MENSAJE DEL SISTEMA ──────────────────────────────────────────────
  function addSystemMessage(text) {
    const div = document.createElement('div');
    div.className = 'msg-system';
    div.innerHTML = `<span>${escapeHTML(text)}</span>`;
    document.getElementById('messages').appendChild(div);
    scrollToBottom();
  }

  // ── LISTA DE USUARIOS ────────────────────────────────────────────────
  function updateUserList(users) {
    const list = document.getElementById('users-list');
    list.innerHTML = users.map(u => `
      <div class="user-item">
        <div class="user-dot"></div>
        <span style="color:${getColor(u)};font-weight:${u===myUsername?'700':'400'}">
          ${escapeHTML(u)} ${u === myUsername ? '(tú)' : ''}
        </span>
      </div>
    `).join('');
  }

  // ── HELPERS ──────────────────────────────────────────────────────────
  function setStatus(connected) {
    const dot = document.getElementById('ws-dot');
    const text = document.getElementById('ws-status-text');
    dot.className = 'ws-dot' + (connected ? '' : ' off');
    text.textContent = connected ? 'Conectado' : 'Desconectado';
  }

  function scrollToBottom() {
    const el = document.getElementById('messages');
    el.scrollTop = el.scrollHeight;
  }

  function escapeHTML(str) {
    return str
      .replace(/&/g,'&amp;')
      .replace(/</g,'&lt;')
      .replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;');
  }

  // Enter en el login
  document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('input-room').addEventListener('keydown', e => {
      if (e.key === 'Enter') connect();
    });
    document.getElementById('input-username').addEventListener('keydown', e => {
      if (e.key === 'Enter') document.getElementById('input-room').focus();
    });
  });
</script>
</body>
</html>
